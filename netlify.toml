[build]
  publish = "."

# panoptic.fr = alias de marque -> 301 vers le domaine principal (pas de contenu duplique).
[[redirects]]
  from = "https://panoptic.fr/*"
  to = "https://panopticaudit.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.panoptic.fr/*"
  to = "https://panopticaudit.com/:splat"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data:; base-uri 'self'; form-action 'self'"
