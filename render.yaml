# Panoptic - deploiement du serveur d'audit sur Render (https://render.com).
# Deploy en un clic: connecter le repo git a Render, il lit ce fichier.
services:
  - type: web
    name: panoptic-audit
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: standard          # 2 Go RAM, toujours chaud (offre payante code + prod)
    healthCheckPath: /api/audits
    envVars:
      - key: PORT
        value: 8787
      # 2 Go permettent plus d'agents en parallele: audits plus rapides.
      - key: AGENT_CONCURRENCY
        value: 8
      # Coupe-circuit navigateur (axe-core / Lighthouse). "off" = aucun Chromium lance,
      # quel que soit l'audit (max securite RAM, zero risque OOM). Pour activer les
      # scanners navigateur sur l'offre payante code+prod: mettre "on" (ou supprimer
      # cette variable). Le garde-fou par-audit (browserAllowed) reserve de toute facon
      # le navigateur au code+prod: un scan gratuit boite-noire ne le lance jamais.
      - key: PANOPTIC_BROWSER
        value: "off"
      # Optionnel: persistance Supabase multi-tenant (sinon stockage local ephemere).
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
