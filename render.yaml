# Panoptic - deploiement du serveur d'audit sur Render (https://render.com).
# Deploy en un clic: connecter le repo git a Render, il lit ce fichier.
services:
  - type: web
    name: panoptic-audit
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: standard          # 2 Go RAM, toujours chaud (offre payante code + prod)
    healthCheckPath: /api/audits
    envVars:
      - key: PORT
        value: 8787
      # 2 Go permettent plus d'agents en parallele: audits plus rapides.
      - key: AGENT_CONCURRENCY
        value: 8
      # Navigateur (axe-core / Lighthouse). "on" = actif sur l'offre payante code+prod
      # (le garde-fou par-audit browserAllowed reserve de toute facon le navigateur au
      # code+prod: un scan gratuit boite-noire ne le lance jamais). "off" = coupe-circuit
      # global (aucun Chromium). Chromium ~1 Go RAM: surveiller l'OOM sous volume.
      - key: PANOPTIC_BROWSER
        value: "on"
      # Persistance Supabase multi-tenant (projet dedie panoptic-audit, eu-west-3).
      # URL non secrete (declaree ici); la cle service_role est un SECRET -> dashboard.
      - key: SUPABASE_URL
        value: "https://hbhtlyagsrrwyosuthjb.supabase.co"
      - key: SUPABASE_SERVICE_KEY
        sync: false   # SECRET: a poser dans le dashboard Render (Environment)
